# ==========================================================
# Alembic config — ZENTHRA.CORE_SECURITY (v3.2)
# Ubicación: NEXUS/alembic.ini
# ==========================================================
# Diseño ZENTHRA:
# ✅ La URL REAL de DB se inyecta desde app.core.settings en alembic/env.py
#    (env.py hace: ini_section["sqlalchemy.url"] = settings.SQLALCHEMY_DATABASE_URI)
#
# Por eso:
# - sqlalchemy.url aquí es SOLO un fallback
# - no necesitas meter credenciales reales aquí (mejor por .env)
# ==========================================================

[alembic]
script_location = alembic

# Permite importar "app.*" desde la raíz del proyecto cuando ejecutas alembic
# (útil en Windows / venv / rutas relativas)
prepend_sys_path = .

# ----------------------------------------------------------
# Fallback SOLO para no romper si env.py no sobreescribe la URL
# (NO es la fuente principal en ZENTHRA)
# ----------------------------------------------------------
sqlalchemy.url = sqlite:///./app.db


# ==========================================================
# Logging
# ==========================================================
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

# Logger raíz
[logger_root]
level = INFO
handlers = console

# SQLAlchemy engine logs (WARM para no spamear)
[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

# Alembic logs
[logger_alembic]
level = INFO
handlers =
qualname = alembic

# Handler consola
[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

# Formato estándar
[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s