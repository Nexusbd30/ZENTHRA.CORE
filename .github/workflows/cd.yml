name: CD

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
    - uses: actions/checkout@v4

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: |
          ghcr.io/${{ github.repository_owner }}/nexus:${{ github.sha }}
          ghcr.io/${{ github.repository_owner }}/nexus:stable

    - name: Setup kubectl
      uses: azure/setup-kubectl@v4
      with:
        version: "v1.30.0"

    - name: Configure kubeconfig
      run: |
        mkdir -p "$HOME/.kube"
        echo "${{ secrets.KUBE_CONFIG_DATA }}" | base64 -d > "$HOME/.kube/config"

    - name: Deploy manifests
      run: |
        kubectl apply -f infra/k8s/configmap.yaml
        kubectl apply -f infra/k8s/secrets.yaml
        kubectl apply -f infra/k8s/deployment-redqueen.yaml
        kubectl apply -f infra/k8s/service.yaml
        kubectl apply -f infra/k8s/hpa.yaml
        kubectl apply -f infra/k8s/pdb.yaml
        kubectl apply -f infra/k8s/networkpolicy.yaml
        kubectl set image deployment/redqueen redqueen=ghcr.io/${{ github.repository_owner }}/nexus:${{ github.sha }}
        kubectl rollout status deployment/redqueen --timeout=180s
