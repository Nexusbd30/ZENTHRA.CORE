# pytest.ini
[pytest]
# ==========================================================
# CONFIGURACIÓN GLOBAL DE PYTEST
# ==========================================================

# Modo asyncio para pruebas async (FastAPI + HTTPX)
asyncio_mode = strict

# Mostrar salidas más detalladas (-v por defecto)
addopts = -v --maxfail=1 --disable-warnings --cov=app --cov-report=term-missing

# Directorios donde buscar tests
testpaths =
    tests

# Archivos y nombres de tests válidos
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Filtrar warnings molestos de librerías externas
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning

# ==========================================================
# NOTA:
# Ejecuta con:
#   pytest
# o para un reporte más limpio de coverage:
#   pytest --cov=app --cov-report=html
#   (te genera carpeta htmlcov/ con un informe navegable)
# ==========================================================