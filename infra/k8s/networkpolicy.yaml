apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redqueen-ingress
spec:
  podSelector:
    matchLabels:
      app: redqueen
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 8000
  egress:
  - to:
    - podSelector: {}
